<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!--CSS-->
    <link rel="stylesheet" href="/To-do-list/style.css">

    <!--Font-->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Pliant:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" integrity="sha512-DTOQO9RWCH3ppGqcWaEA1BIZOC6xxalwEsw9c2QQeAIftl+Vegovlnee1c9QX4TctnWMn13TZye+giMm8e2LwA==" crossorigin="anonymous" referrerpolicy="no-referrer" />   
    <title>To-Do List</title>
</head>
<body>
    <main>
    <div class="header">
        <h1>My Tasks</h1>
        <p>Today date</p> <!--Date should be dynamic here-->
    </div>

    <!--Card based top-->
    <div class="card-stats">
        <div class="card-stats__item card-stats__item--total">
            <h3>1</h3> <!--This number here should be dynamic-->
            <p>Total</p>
        </div>
        <div class="card-stats__item card-stats__item--done">
            <h3>1</h3>
            <p>Done</p>
        </div>
        <div class="card-stats__item card-stats__item--left">
            <h3>0</h3> <!--This number here should be dynamic-->
            <p>Left</p>
        </div>
    </div>

    <!--Input Task-->
    <div class="input-task">
        <input type="text" id="task-input" placeholder="Add a new task...">
        <button class="btn btn--add"><i class="fa-solid fa-plus"></i> Add</button>
    </div>

    <!--buttons where it filter-->
    <div class="align-buttons">
        <button class="btn btn--all">All</button>
        <button class="btn btn--active">Active</button>
        <button class="btn btn--done">Done</button>
    </div>

    <!--List of task-->
    <div class="task-list">
        <div class="task">
            <input type="checkbox" id="vehicle1" name="vehicle1" value="Bike">
            <label for="vehicle1"> I have a bike</label>
            <button class="btn btn--delete"><i class="fa-regular fa-trash-can"></i></button>
        </div>
    </div>
    </main>
</body>
</html>
